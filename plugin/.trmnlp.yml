# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
watch:
  - .trmnlp.yml
  - src

custom_fields: {}

variables:
  trmnl:
    system:
      timestamp_utc: 1700000000
    plugin_settings:
      instance_name: "Lorcana Cards"
      strategy: polling
      dark_mode: "no"
      no_screen_padding: "yes"
      custom_fields_values:
        color: ""
        rarity: ""
        card_type: ""
        set_id: ""
  labels:
    cost: Cost
    lore: Lore
    str: Str
    will: Wlp
    type: Type
    rarity: Rarity
    set: Set
    artist: Artist
    ink: Ink
    inkable: Inkable
    franchise: Franchise
  items:
    - name: "Elsa - Snow Queen"
      color: "Amethyst"
      cost: 6
      type: "Character"
      lore: 3
      strength: 3
      willpower: 6
      inkable: false
